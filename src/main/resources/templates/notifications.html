<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Le mie notifiche</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        .notification { padding:10px; border-bottom:1px solid #e0e0e0 }
        .notification .meta { font-size:0.85em; color:#666 }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Notifiche</h1>
        <a th:href="@{/home}">Home</a> |
        <a th:href="@{/profile}">Profilo</a>
    </header>

    <section>
        <div th:if="${notifications.isEmpty()}">
            <p>Non ci sono notifiche.</p>
        </div>

        <div th:each="n : ${notifications}" class="notification">
            <div th:text="${n.message}"></div>
            <div class="meta" th:text="${#dates.format(n.createdAt, 'dd/MM/yyyy HH:mm')}"></div>
        </div>
    </section>
</div>
</body>
</html>
